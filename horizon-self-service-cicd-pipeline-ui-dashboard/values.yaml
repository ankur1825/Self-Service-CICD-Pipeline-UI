namespaceOverride: horizon-relevance-dev

replicaCount: 1

image:
  repository: 426946630837.dkr.ecr.us-east-1.amazonaws.com/horizon/frontend
  tag: "1.4.19"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: false
  name: ""  

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - host: horizonrelevance.com
      paths:
        - path: /pipeline(/|$)(.*)
          pathType: ImplementationSpecific
  redirect:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/permanent-redirect: http://horizonrelevance.com/pipeline/
    hosts:
      - host: horizonrelevance.com
        paths:
          - path: /pipeline
            pathType: Exact

persistence:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 10Gi

backendAlias:
  enabled: false
  name: horizon-backend
  selector: {}
  port: 8000
  targetPort: 8000
