namespaceOverride: horizon-relevance-dev

replicaCount: 1

image:
  repository: ankur1825/horizon-self-service-cicd-pipeline-ui-dashboard
  tag: "1.3.1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: false
  name: ""  

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - host: horizonrelevance.com
      paths:
        - path: /pipeline(/|$)(.*)
          pathType: ImplementationSpecific

persistence:
  enabled: true
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 10Gi
