namespaceOverride: horizon-relevance-dev

replicaCount: 1

image:
  repository: ankur1825/horizon-self-service-cicd-pipeline-ui-dashboard
  tag: "1.4.8"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

backendAlias:
  enabled: true
  name: horizon-backend
  port: 8000
  targetPort: 8000
  selector:
    app: horizon-self-service-cicd-pipeline-backend

serviceAccount:
  create: false
  name: ""  

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - host: horizonrelevance.com
      paths:
        - path: /pipeline/(.*)
          pathType: ImplementationSpecific

  redirect:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/permanent-redirect: https://horizonrelevance.com/pipeline/
    hosts:
      - host: horizonrelevance.com
        paths:
          - path: /pipeline
            pathType: Exact

persistence:
  enabled: true
  storageClass: gp3
  accessMode: ReadWriteOnce
  size: 10Gi
