{{- if .Values.backendAlias.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backendAlias.name }}
  namespace: {{ .Values.namespaceOverride }}
spec:
  type: ClusterIP
  selector:
    {{- toYaml .Values.backendAlias.selector | nindent 4 }}
  ports:
    - port: {{ .Values.backendAlias.port }}
      targetPort: {{ .Values.backendAlias.targetPort }}
{{- end }}
