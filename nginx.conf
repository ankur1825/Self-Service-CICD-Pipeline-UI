server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Redirect / -> /pipeline/
  location = / { return 302 /pipeline/; }

  # API proxy (change the host if your backend is another container)
  location /pipeline/api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://horizon-backend:8000;
    #proxy_pass http://127.0.0.1:8000/;  # <— if backend runs in another container, use its service name instead of 127.0.0.1
  }

  # Serve the SPA under /pipeline/ even though files live at /
  location /pipeline/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /index.html;
  }
}








